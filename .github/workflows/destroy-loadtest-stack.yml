name: Destroy Loadtest Stack

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name (for reference)'
        required: true
        type: choice
        options:
          - untuva
          - hahtuva
          - pallero
        default: pallero

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  LOADTEST_STACK_NAME: oma-opiskelijavalinta-LoadtestStack

jobs:
  destroy-stack:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node-env
        with:
          project_path: cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OPINTOPOLKU_DEV_ROLE_ARN }}
          role-session-name: destroy-stack-session
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy Loadtest Stack
        working-directory: ./cdk
        run: |
          pnpm install
          pnpm dlx aws-cdk destroy ${LOADTEST_STACK_NAME} -f
