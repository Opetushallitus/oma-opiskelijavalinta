name: Run Loadtest

on:
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy LoadtestStack after run?'
        required: false
        default: 'false'

jobs:
  loadtest:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-env
        with:
          project_path: cdk

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Deploy LoadtestStack
        working-directory: ./cdk
        run: cdk deploy LoadtestStack --require-approval never

      - name: Get Loadtest EC2 instance ID
        id: ec2info
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=LoadtestStack" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Run k6 on EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=instanceIds,Values=$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Run k6 load test" \
            --parameters 'commands=["cd /home/ec2-user/loadtest && pnpm install && k6 run script.js --out json=/home/ec2-user/results.json"]' \
            --query "Command.CommandId" \
            --output text)
          
          echo "Waiting for SSM command to finish..."
          aws ssm wait command-executed --command-id $COMMAND_ID --instance-id $INSTANCE_ID

      - name: Download results.json
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "StandardOutputContent" \
            --output text > ./loadtest/results-$TIMESTAMP.json

      - name: Upload results to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 cp ./loadtest/results-$TIMESTAMP.json s3://oma-opintopolku-loadtest/results-$TIMESTAMP.json

      - name: Destroy LoadtestStack (optional)
        if: ${{ github.event.inputs.destroy == 'true' }}
        working-directory: ./cdk
        run: cdk destroy LoadtestStack -f
