name: Loadtest

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        type: choice
        options:
          - untuva
          - hahtuva
          - pallero
        default: 'pallero'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  LOADTEST_STACK_NAME: oma-opiskelijavalinta-LoadtestStack
  S3_RESULTS_BUCKET: oma-opiskelijavalinta-loadtest

jobs:
  run-loadtest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node-env
        with:
          project_path: cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OPINTOPOLKU_DEV_ROLE_ARN }}
          role-session-name: loadtest-session
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy stack
        working-directory: ./cdk
        run: |
          pnpm install
          pnpm dlx aws-cdk deploy ${LOADTEST_STACK_NAME} \
            --require-approval never \
            -c environment=${{ github.event.inputs.environment }}
