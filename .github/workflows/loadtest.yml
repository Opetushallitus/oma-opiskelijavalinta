name: Loadtest

on:
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy stack after test'
        required: false
        default: 'true'
      environment:
        description: 'Test environment'
        required: true
        type: choice
        options:
          - untuva
          - hahtuva
          - pallero
        default: 'pallero'

env:
  AWS_REGION: eu-west-1
  LOADTEST_STACK_NAME: LoadtestStack
  S3_RESULTS_BUCKET: oma-opintopolku-loadtest

jobs:
  run-loadtest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node-env
        with:
          project_path: cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OPINTOPOLKU_DEV_ROLE_ARN }}
          role-session-name: loadtest-session
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy stack
        working-directory: ./cdk
        run: |
          pnpm install
          npx cdk deploy ${LOADTEST_STACK_NAME} \
            --require-approval never \
            -c environment=${{ github.event.inputs.environment }}

      - name: Wait for instance
        run: sleep 60

      - name: Run load test via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=${LOADTEST_STACK_NAME}" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          aws ssm send-command \
            --targets "Key=instanceIds,Values=${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Run k6 load test" \
            --parameters commands="[
              \"cd /home/ec2-user/loadtest\",
              \"export ENVIRONMENT=${{ github.event.inputs.environment }}\",
              \"pnpm install\",
              \"k6 run script.js --out json=/tmp/results-${TIMESTAMP}.json\",
              \"aws s3 cp /tmp/results-${TIMESTAMP}.json s3://${S3_RESULTS_BUCKET}/results-${TIMESTAMP}.json\"
            ]"

      - name: Destroy stack
        if: ${{ github.event.inputs.destroy == 'true' }}
        working-directory: ./cdk
        run: |
          npx cdk destroy ${LOADTEST_STACK_NAME} -f
