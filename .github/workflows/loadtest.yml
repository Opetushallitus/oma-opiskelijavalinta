name: Loadtest

on:
  workflow_dispatch:

jobs:
  run-loadtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Deploy EC2 stack
      - name: Deploy LoadtestStack
        run: |
          cd cdk
          npx cdk deploy LoadtestStack --require-approval never -c "environmentName=dev"

      # Trigger load test on EC2 using SSM
      - name: Run k6 test on EC2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:cdk:stack-name,Values=LoadtestStack" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          aws ssm send-command \
            --targets "Key=instanceIds,Values=$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Start k6 load test" \
            --parameters 'commands=[
              "cd /home/ec2-user/loadtest",
              "pnpm install",
              "k6 run script.js --out json=/home/ec2-user/loadtest/results-$(date +%Y%m%d-%H%M%S).json",
              "aws s3 cp /home/ec2-user/loadtest/results-*.json s3://oma-opintopolku-loadtest/ --acl private"
            ]'

      # Destroy EC2 stack
      - name: Destroy LoadtestStack
        run: |
          cd cdk
          npx cdk destroy LoadtestStack -f
