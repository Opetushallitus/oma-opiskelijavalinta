name: Loadtest

on:
  workflow_dispatch:

jobs:
  run-loadtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-env
        with:
          project_path: loadtest

      # Install k6 for load testing
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          sudo wget -q -O - https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      # Run the test
      - name: Run k6 load test
        env:
          AWS_REGION: eu-west-1
          S3_BUCKET: oma-opintopolku-loadtest
        run: |
          cd loadtest
          pnpm install        # ensure local dependencies are ready
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          RESULT_FILE="results-$TIMESTAMP.json"
          echo "Running k6 test -> $RESULT_FILE"
          k6 run script.js --out json=$RESULT_FILE
          
          # Upload to S3
          aws s3 cp $RESULT_FILE s3://$S3_BUCKET/$RESULT_FILE
          echo "Uploaded $RESULT_FILE to s3://$S3_BUCKET/"
          aws s3 cp $RESULT_FILE s3://$S3_BUCKET/latest.json
