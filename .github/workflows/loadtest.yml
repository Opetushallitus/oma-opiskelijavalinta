name: Loadtest

on:
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy stack after test'
        required: false
        default: 'false'

env:
  AWS_REGION: eu-west-1
  LOADTEST_STACK_NAME: LoadtestStack
  S3_RESULTS_BUCKET: oma-opintopolku-loadtest

jobs:
  run-loadtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node + pnpm for cdk folder
        uses: ./.github/actions/setup-node-env
        with:
          project_path: cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Loadtest Stack
        working-directory: ./cdk
        run: |
          pnpm install
          npx cdk deploy ${LOADTEST_STACK_NAME} --require-approval never

      - name: Wait for EC2 instance to be ready
        run: sleep 30

      - name: Run k6 load test via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=${LOADTEST_STACK_NAME}" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          OUTPUT_FILE="/tmp/results-${TIMESTAMP}.json"

          aws ssm send-command \
            --targets "Key=instanceIds,Values=${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Run k6 load test" \
            --parameters 'commands=["cd /home/ec2-user/loadtest && pnpm install && k6 run script.js --out json='"${OUTPUT_FILE}"'"]'

      - name: Download results and upload to S3
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=${LOADTEST_STACK_NAME}" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          LOCAL_FILE="./results-${TIMESTAMP}.json"

          aws ssm get-command-invocation \
            --command-id $(aws ssm list-commands \
              --filters "Key=DocumentName,Values=AWS-RunShellScript" \
              --query "Commands[-1].CommandId" --output text) \
            --instance-id ${INSTANCE_ID} \
            --query "StandardOutputContent" --output text > ${LOCAL_FILE}

          aws s3 cp ${LOCAL_FILE} s3://${S3_RESULTS_BUCKET}/results-${TIMESTAMP}.json

      - name: Destroy Loadtest Stack (optional)
        if: ${{ github.event.inputs.destroy == 'true' }}
        working-directory: ./cdk
        run: |
          npx cdk destroy ${LOADTEST_STACK_NAME} -f
